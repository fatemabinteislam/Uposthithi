<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uposthithi - Password Change</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#fee6ae] min-h-screen relative flex items-center justify-center p-4">

    <div class="bg-[#FDCE9A] border-[1px] border-[#FCB87A] rounded-[24px] py-4 px-16 w-full max-w-md shadow-lg flex flex-col items-center blur-sm pointer-events-none">
        
        <div class="mb-2">
            <img src="Logo.png" alt="Uposthithi Logo" class="w-16 h-16 object-contain mx-auto">
        </div>

        <h1 class="text-[#1A1A3D] text-4xl font-bold mb-1">Uposthithi</h1>
        <p class="text-[#FF8444] text-lg font-bold mb-6">Normal User ID</p>
 
         <form class="w-full space-y-3">
             <input type="text" placeholder="User ID" 
                 class="w-2/3 py-1 bg-white rounded-md text-center border-none focus:ring-2 focus:ring-[#FF8444] outline-none mx-auto block">
             <input type="password" placeholder="Password" 
                 class="w-2/3 py-1 bg-white rounded-md text-center border-none focus:ring-2 focus:ring-[#FF8444] outline-none mx-auto block">
            
             <div class="text-right mb-2">
                 <a href="Password.html" class="text-xs font-semibold text-[#FF8444] hover:underline">Forgot password?</a>
             </div>

             <div class="flex justify-center -mt-2"> 
                 <button type="submit" class="bg-[#FF5E1E] text-white px-8 py-0 font-bold rounded-md hover:bg-[#E64D13] transition-all">
                     Login
                 </button>
             </div>
         </form>
        <form class="w-full space-y-3">
            <input type="text" placeholder="User ID" class="w-2/3 py-1 bg-white rounded-md text-center border-none outline-none mx-auto block">
            <input type="password" placeholder="Password" class="w-2/3 py-1 bg-white rounded-md text-center border-none outline-none mx-auto block">
            
            <div class="text-right mb-2">
                <a href="#" class="text-xs font-semibold text-[#FF8444]">Forgot password?</a>
            </div>

            <div class="flex justify-center -mt-2"> 
                <button type="button" class="bg-[#FF5E1E] text-white px-8 py-0 font-bold rounded-md">
                    Login
                </button>
            </div>
        </form>
    </div>


    <!-- Password Change part -->
    <div class="absolute inset-0 flex items-center justify-center p-4">
        <div class="bg-[#FED5AE] border-2 border-[#FCB87A] rounded-xl p-6 w-full max-w-[380px] shadow-2xl relative">
            
            <button class="absolute top-2 right-2 text-[#FF5E1E] bg-white rounded-sm border border-[#FCB87A] p-0.5 hover:bg-gray-50">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-4 h-4">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>

            <h3 class="text-center text-[#1A1A3D] font-bold text-lg mb-6">Password Change</h3>

            <div class="flex items-center gap-2 mb-8">
                <label class="text-[#1A1A3D] font-bold text-sm whitespace-nowrap">Number :</label>
                <input type="text" class="flex-grow bg-[#FFF5EC] rounded-md h-8 px-2 border-none focus:ring-1 focus:ring-[#FF5E1E] outline-none">
            </div>

            <div class="flex justify-center">
                <button class="bg-[#FF5E1E] text-white px-10 py-2 rounded-md font-bold text-sm hover:bg-[#E64D13] transition-all">
                    OTP Sent
                </button>
            </div>
        </div>
    </div>

</body>
</html>
